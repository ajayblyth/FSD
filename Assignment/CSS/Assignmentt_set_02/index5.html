<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>

    .container-grid {
  display: flex;
  flex-wrap: wrap; /* Allows items to move to the next row */
  justify-content: space-evenly;
  align-content: space-evenly;
  width: 400px;
  height: 400px;
  border: 1px solid #ccc;
}

.box {
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100px;
  height: 100px;
  background-color: grey;
  font-size: 50px;
  border-radius: 10px;
  border: 1px solid black;
}
</style>
<body>

    <div class="container-grid">
  <div class="box">A</div>
  <div class="box">B</div>
  <div class="box">C</div>
  <div class="box">D</div>
  <div class="box">E</div>
  <div class="box">F</div>
  <div class="box">G</div>
  <div class="box">H</div>
  <div class="box">I</div>
</div>
    
</body>
</html>
