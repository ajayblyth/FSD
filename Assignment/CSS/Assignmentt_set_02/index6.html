
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid Layout with Media Query</title>
    <style>
        .container {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-template-rows: repeat(12, 100px); 
            gap: 10px;
            padding: 10px;
        }

       .container > * {     /*immediate child */
            background-color: pink;
            border: 1px solid white;
            display: flex;
            align-items: flex-start;
            padding: 5px;
            font-family: serif;
            font-size: 14px;
        }

        header {
            grid-column: span 12;
            grid-row: span 1;
        }
        
          .sidebar {
            grid-column: 1 / span 3;
            grid-row: 2 / span 10;
        }

        nav {
            grid-column: 4 / span 6;
            grid-row: 2 / span 1;
        }

        main {
            grid-column: 4 / span 6;
            grid-row: 3 / span 9;
        }

        .ads {
            grid-column: 10 / span 3;
            grid-row: 2 / span 10;
        }

      

        footer {
            grid-column: span 12;
            grid-row: 12 / span 1; 

        @media (max-width: 720px) {
            header {
                grid-column: span 12;
                grid-row: 1 / span 1;
            }

            nav {
                grid-column: span 12;
                grid-row: 2 / span 1;
            }

            .sidebar {
                grid-column: 1 / span 3;
                grid-row: 3 / span 9;
            }

            main {
                grid-column: 4 / span 9; 
                grid-row: 3 / span 9;
            }

            .ads {
                grid-column: 1 / span 3;
                grid-row: 12 / span 1; 
            }

            footer {
                grid-column: 4 / span 9; 
                grid-row: 12 / span 1;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>header (1row, 12column)</header>
        <nav>navigation (1row, 12column)</nav>
        <aside class="sidebar">sidebar (9row, 3column)</aside>
        <main>main (9row, 9column)</main>
        <aside class="ads">ads (1row, 3column)</aside>
        <footer>footer (1row, 9column)</footer>
    </div>
    
</body>
</html>
