<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Shadows</title>

    <style>
        body {
            background-color: aqua;
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        /* COMMON CARD STYLING */
        .card {
            width: 200px;
            height: 250px;
            border: 2px solid black;
            display: inline-block;
            margin-left: 10px;
            border-radius: 5px;
            overflow: hidden;
            vertical-align: top;
            transition: box-shadow 0.3s ease, transform 0.3s ease;
        }

        /* IMAGE INSIDE CARD */
        .card img {
            width: 100%;
            height: 50%;
            display: block;
        }

        /* CARD CONTENT */
        .card div {
            padding: 10px;
        }

        /* INDIVIDUAL CARD SHADOWS */
        #card1 {
            box-shadow: 0px 4px 8px red;
        }

        #card1:hover {
            box-shadow: 0px 8px 20px red;
            transform: translateY(-5px);
        }

        #card2 {
            box-shadow: 0px 4px 8px blue;
        }

        #card2:hover {
            box-shadow: 0px 8px 20px blue;
            transform: translateY(-5px);
        }

        #card3 {
            box-shadow: 0px 4px 8px green;
        }

        #card3:hover {
            box-shadow: 0px 8px 20px green;
            transform: translateY(-5px);
        }

    </style>
</head>

<body>

    <!-- CARD 1 -->
    <div class="card" id="card1">
        <img src="https://t4.ftcdn.net/jpg/02/24/86/95/360_F_224869519_aRaeLneqALfPNBzg0xxMZXghtvBXkfIA.jpg" alt="man">
        <div>
            <h3>Raman</h3>
            <p>Data Analyst</p>
        </div>
    </div>

    <!-- CARD 2 -->
    <div class="card" id="card2">
        <img src="https://media.istockphoto.com/id/1496615445/photo/portrait-of-beautiful-happy-woman-smiling-during-sunset-outdoor.jpg?s=612x612&w=0&k=20&c=_HXfCjbresNg_9Y-z1XHrw-JPBzov9l39RK_8Qmv7nk=" alt="woman">
        <div>
            <h3>Neha</h3>
            <p>Something</p>
        </div>
    </div>

    <!-- CARD 3 -->
    <div class="card" id="card3">
        <img src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?auto=format&fit=crop&w=400&q=80" alt="person3">
        <div>
            <h3>Alex</h3>
            <p>Designer</p>
        </div>
    </div>

</body>

</html>
