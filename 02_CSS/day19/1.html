<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spotify Web</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <!-- LEFT SIDEBAR -->
    <aside class="sidebar">
        <div class="logo">Spotify</div>

        <nav class="menu">
            <a href="#">Home</a>
            <a href="#">Search</a>
            <a href="#">Your Library</a>
        </nav>

        <div class="playlist">
            <p>Create Playlist</p>
            <p>Liked Songs</p>
        </div>
    </aside>

    <!-- MAIN SECTION -->
    <main class="main">

        <!-- TOP NAVBAR -->
        <header class="topbar">
            <button>&lt;</button>
            <button>&gt;</button>
            <button class="login">Log in</button>
        </header>

        <!-- CONTENT AREA -->
        <section class="content">
            <h2>Recently Played</h2>

            <div class="cards">
                <div class="card">
                    <img src="album.jpg" alt="">
                    <p>Album Name</p>
                </div>

                <div class="card">
                    <img src="album.jpg" alt="">
                    <p>Album Name</p>
                </div>
            </div>
        </section>

    </main>

</div>

<!-- BOTTOM PLAYER -->
<footer class="player">
    <div class="song-info">Song Name - Artist</div>
    <div class="controls">
        ⏮ ▶ ⏭
    </div>
    <div class="volume">🔊</div>
</footer>

</body>
</html>
