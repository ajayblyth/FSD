<!DOCTYPE html>
<html>
<head>
  <title>CSS Box Model + Display + Units</title>
  <link rel="stylesheet" href="style3.css">

</head>

<body>
  <div class = "block-box content-box">
    <h1>
      test1
    </h1>
  </div>

  <div class="page">

    <h1>Block Elements</h1>

    <div class="block-box content-box">
      Content Box Model
    </div>

    <div class="block-box border-box">
      Border Box Model
    </div>

    <h1>Inline Elements</h1>

    <p>
      This is a
      <span class="inline-text">span inline</span>
      inside text
      <span class="inline-text">another span</span>
    </p>

    <h1>Inline-Block Elements</h1>

    <div class="row">
      <span class="inline-block-box">One</span>
      <span class="inline-block-box">Two</span>
      <span class="inline-block-box">Three</span>
    </div>

    <h1>Relative Units</h1>

    <div class="units">

      <div class="em-box">em unit</div>
      <div class="rem-box">rem unit</div>
      <div class="percent-box">% unit</div>
      <div class="vw-box">vw unit</div>
      <div class="vh-box">vh unit</div>
      <div class="vmin-box">vmin</div>
      <div class="vmax-box">vmax</div>

    </div>

  </div>

</body>
</html>
