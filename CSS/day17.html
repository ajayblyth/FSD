<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidebar Menu Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="day17.css">
</head>
<body>

    <!-- Hidden checkbox to control sidebar -->
    <input type="checkbox" id="check">

    <!-- Sidebar toggle button (open) -->
    <label for="check" class="btn_one">
        <i class="fas fa-bars"></i>
    </label>

    <!-- Sidebar menu -->
    <div class="sidebar_menu">

        <!-- Logo -->
        <div class="logo">
            <a href="#">My Logo</a>
        </div>

        <!-- Close button (must be label linked to checkbox) -->
        <label for="check" class="btn_two">
            <i class="fas fa-times"></i>
        </label>

        <!-- Menu Items -->
        <ul class="menu">
            <li><i class="fas fa-home"></i><a href="#">Home</a></li>
            <li><i class="fas fa-user"></i><a href="#">About</a></li>
            <li><i class="fas fa-briefcase"></i><a href="#">Services</a></li>
            <li><i class="fas fa-envelope"></i><a href="#">Contact</a></li>
            <li><i class="fas fa-question-circle"></i><a href="#">Help</a></li>
        </ul>

        <!-- Social Media Icons -->
        <div class="social_media">
            <i class="fab fa-facebook-f"></i>
            <i class="fab fa-twitter"></i>
            <i class="fab fa-instagram"></i>
            <i class="fab fa-linkedin-in"></i>
        </div>

    </div>

    <!-- Main content / background -->
    <div class="main_box">
        <h1 style="color:white; text-align:center; padding-top:50px;">Welcome to My Sidebar Page</h1>
    </div>

</body>
</html>
