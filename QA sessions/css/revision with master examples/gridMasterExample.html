<!-- CSS GRID MASTER ASSIGNMENT

===================== QUESTION =====================

Create a responsive dashboard layout using CSS Grid.

REQUIREMENTS:

1) Header at top (full width)
2) Sidebar on left
3) Main content in center
4) Extra panel on right
5) Footer at bottom (full width)

6) Inside main content:
   - 6 cards
   - Cards should auto-fit responsively
   - One card should span 2 columns
   - One card should span 2 rows

7) Proper alignment using grid alignment properties

After completing this, you should understand
ALL major Grid concepts.
-->

<!DOCTYPE html>
<html>
<head>
<title>Grid Master Assignment</title>

<style>

/* ================= MAIN LAYOUT ================= */

.container {
    display: grid;                      /* activate grid */

    grid-template-columns: 200px 1fr 200px;  /* sidebar | main | extra */

    grid-template-rows: 80px 1fr 60px;       /* header | content | footer */

    grid-template-areas:
        "header header header"          /* row 1 */
        "sidebar main   extra"          /* row 2 */
        "footer footer footer";         /* row 3 */

    min-height: 100vh;

    gap: 10px;                          /* spacing between grid cells */

    justify-content: center;      
          /* align whole grid horizontally */

    align-content: start;               /* align whole grid vertically */
}


/* ================= AREA ASSIGNMENT ================= */

.header  { grid-area: header;  background: #222; color: white; }
.sidebar { grid-area: sidebar; background: #444; color: white; }
.main    { grid-area: main;    background: #eee; }
.extra   { grid-area: extra;   background: #ccc; }
.footer  { grid-area: footer;  background: #222; color: white; }


/* ================= MAIN INNER GRID ================= */

.main {
    display: grid;                      /* nested grid */

    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                                            /* responsive auto columns */

    gap: 15px;

    justify-items: center;              /* horizontal align inside cells */

    align-items: center;                /* vertical align inside cells */
}


/* ================= CARDS ================= */

.card {
    background: lightblue;
    padding: 20px;
    text-align: center;
}


/* Span 2 columns */
.card.wide {
    grid-column: span 2;                /* takes 2 columns */
}


/* Span 2 rows */
.card.tall {
    grid-row: span 2;                   /* takes 2 rows */
}


/* Example of explicit placement */
.card.manual {
    grid-column: 1 / 3;                 /* start col 1 end before col 3 */
}


/* ================= GLOBAL ALIGN SHORTCUT ================= */

.center-demo {
    display: grid;
    place-items: center;                /* justify-items + align-items */
    height: 100%;
}

</style>
</head>

<body>

<div class="container">

    <div class="header center-demo">Header</div>

    <div class="sidebar center-demo">Sidebar</div>

    <div class="main">
        <div class="card">1</div>
        <div class="card wide">2 Wide</div>
        <div class="card">3</div>
        <div class="card tall">4 Tall</div>
        <div class="card">5</div>
        <div class="card">6</div>
    </div>

    <div class="extra center-demo">Extra Panel</div>

    <div class="footer center-demo">Footer</div>

</div>

</body>
</html>
