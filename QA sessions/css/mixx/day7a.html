<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=add_alert" />
    <!-- Question 2 – Navigation Bar (Display Inline / Block)

Create a navigation bar.

Requirements:
Background: black
Text color: white
5 menu items
Remove list bullets
Display menu items in one line
Add spacing between items
On hover → change text color to yellow -->


    <style>
        body {
            margin: 0px;
        }

        .navbar {
            height: 50px;
            background-color: black;

        }


        .navbar ul li {
            display: inline-block;
            margin-right: 25px;
        }

        .navbar a {
            color: white;
        }

        .navbar a:hover {
            color: yellow;
        }

        /* Add text “Bell” on the top-right corner of navbar

Add a small red notification badge showing number “5”

Badge must:

Appear at top-right of the word “Bell”

Slightly overlap it

Stay properly positioned

Navbar should stay at top (fixed)

 No flex / grid
 Use proper positioning 

 tilt to right a bit , navbar should stay on the top
 bell icon on    top right with a badge including number --> */
        .bell {
            position: absolute;
            right: 20px;
            background: black;
            top: 20px;
            color: white;

        }

        .bell:hover {

            color: yellow;
        }

        .badge {
            position: absolute;
            background: red;

            right: 6px;
            color: white;
            font-size: 10px;
            padding: 2px 2px 2px 2px;
            border-radius: 50%;
        }
    </style>
</head>

<body>

    <nav class=" navbar">
        <ul>


            <li><a href="">Home</a></li>
            <li><a href=""> about</a> </li>
            <li> <a href=""> services</a></li>
            <li> <a href="">contact</a> </li>


        </ul>

        <div class="bell">
            <span class="material-symbols-outlined">
                add_alert
            </span>
            <span class="badge">5</span>


        </div>



    </nav>



</body>

</html>
