<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        header{
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
            background-color: black;
            padding: 10px;


        }
        .logo{
            color: white;
        }

        .cart{
            color: white;
        
        }

        .product{
            display: grid;
grid-template-columns: 40% 60%;   
max-width: 1100px;  
margin: 50px auto ;
gap: 20px;
   }

   .badge{
    position:absolute;
    top: 10px;
    left: 10px;

    background-color: red;
    color: white;
    padding: 5px 10px;
   }

   .left{
    position: relative;
   }
   .related-section{
    padding: 40px;

   }
   .cards{
    display: grid;
    grid-template-columns: repeat(auto-fit , minmax(200px,1fr));
    gap: 20px;
   }
   .card{
    background-color: rgb(209, 194, 194);
    padding: 20px;
    border-radius: 8px;
height: 150px;

   }
   .scroll-card{
    overflow: auto;
   }

      /* Related Products Grid (Responsive)

Below product section:
Create 6 product cards.

Requirements:
Use:

grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));

Add gap.
Cards must be equal height. */


    </style>

</head>
<body>

    <header>
        <div class="logo">Store</div>

        <div  class="search">
            <input type="text" placeholder="search product">
        </div>

        <div class="cart"> cart(2)</div>

    </header>
    <section class="product">

        <div class="left">
            <div class="badge">20% off</div>

        <img  src="https://picsum.photos/400/400" alt="scenary">

        </div>
        <div class="right">

                    <h2>Product Name</h2>
                    <h4>$199</h4>
                    <h4>here are some image details</h4>


        </div>
    </section>



    <section class="related-section">
  <h3>Related Products</h3>
  <div class="cards">
    <div class="card">Product 1</div>
    <div class="card">Product 2</div>
    <div class="card">Product 3</div>
    <div class="card">Product 4</div>
    <div class="card">Product 5</div>
    <div class="card scroll-card">
      Long content... <br><br>
      Lorem ipsum dolor sit amet...<br>
      Lorem ipsum dolor sit amet...<br>
      Lorem ipsum dolor sit amet...
    </div>
  </div>
</section>

    <footer>
        <p>my Store</p>
    </footer>
    
</body>
</html>
