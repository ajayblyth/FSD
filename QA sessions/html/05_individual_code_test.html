<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <a href="https://www.google.com/" target="_blank">google</a><br><br><br>

    <section class="programming languages">

        <ul>
            <li>Python</li>
            <li>Java Script</li>
            <li>Java</li>

        </ul>
        <br><br><br>

        <form action="">

            <label for="hobbies">reading</label>
            <input type="checkbox" id="hobby" name="hobbies" value="reading">

            <label for="hobbies">gaming</label>
            <input type="checkbox" name="hobbies" value="gaming">

            <label for="hobbies">music</label>
            <input type="checkbox" name="hobbies" value="listening music">



        </form>

        <!-- create a required email field, restriction , pattern <gmail class="com"></gmail> -->
    </section>

    <form action="">


        <label for="email">email</label>
        <input type="email" id="email" required pattern="[a-zA-z/s]+@gmail.com"
            title="enter email address ending with @gmail.com">
        <button type="submit"> submit</button>
    </form>
    <!-- age min 18 and max 60 -->
    <br><br>

    <form action="">

        <label for="age">age</label>
        <input type="number" name="age" id="age" min="18" max="60" title="age should be between 18 and 60">
        <button type="submit"> submit</button>

    </form><br><br>
    <!-- dropdown -->

    <form action="#">

        <label for="languages">Language:</label>
        <br><br>

        <select name="languages[]" id="languages" multiple size="3">
            <option value="english">English</option>
            <option value="kannada">Kannada</option>
            <option value="hindi">Hindi</option>
        </select>

        <br><br>

        <input type="submit" value="Submit">

    </form>



</body>
